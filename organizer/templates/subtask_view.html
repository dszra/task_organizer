<li data-subtask-id="{{ subtask.id }}" class="subtask-item">
    <div class="subtask-main-row">
        <label class="subtask-label">
            <input type="checkbox" class="subtask-done-checkbox" {% if subtask.done %}checked{% endif %}> 
            <span class="subtask-title">
                {% if subtask.done %}
                    <span style="text-decoration: line-through; color: #a0aec0;">{{ subtask.title }}</span>
                {% else %}
                    <span>{{ subtask.title }}</span>
                {% endif %}
                {% if subtask.end_date %}
                    <span class="subtask-date">(End: {{ subtask.end_date }})</span>
                {% endif %}
            </span>
        </label>
        <button class="delete-subtask-btn">Delete</button>
    </div>
    
    {% if subtask.description %}
        <div class="subtask-description-block">
            {{ subtask.description }}
        </div>
    {% endif %}
    <span class="sub-description" style="display: none;">{{ subtask.description }}</span>
</li>
